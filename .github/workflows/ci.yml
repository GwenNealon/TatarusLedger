name: CI

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Universalis API snapshot and generated types
        timeout-minutes: 5
        run: npm run api:spec:check

      - name: Validate XIVAPI snapshot and generated types
        timeout-minutes: 5
        run: npm run api:xivapi:spec:check

      - name: Validate FFXIV Lodestone SSF font files
        timeout-minutes: 5
        run: npm run fonts:ffxiv:check

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:coverage
